apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-ekyc-api
  namespace: startup-tenant-alpha

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: mock-ekyc-api

  template:
    metadata:
      labels:
        app: mock-ekyc-api

    spec:
      containers:
      - name: mock-ekyc-api
        image: mock-registry/mock-ekyc-api:latest

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 20

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "500m"

        env:
        - name: REDIS_HOST
          value: redis

---

apiVersion: v1
kind: Service

metadata:
  name: mock-ekyc-service
  namespace: startup-tenant-alpha

spec:
  selector:
    app: mock-ekyc-api

  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
