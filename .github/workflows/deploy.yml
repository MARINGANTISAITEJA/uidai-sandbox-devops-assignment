name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mock-ekyc-api
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ghcr.io/${{ github.repository }}/mock-ekyc-api:${{ github.sha }} .

    - name: Run Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository }}/mock-ekyc-api:${{ github.sha }}
        format: table
        exit-code: 0

    - name: Push Docker Image
      run: |
        docker push ghcr.io/${{ github.repository }}/mock-ekyc-api:${{ github.sha }}

    - name: Configure kubectl
      uses: azure/setup-kubectl@v4

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/mock-ekyc-api \
        mock-ekyc-api=ghcr.io/${{ github.repository }}/mock-ekyc-api:${{ github.sha }} \
        -n startup-tenant-alpha
